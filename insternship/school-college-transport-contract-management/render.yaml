services:
  - type: web
    name: transport-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm ci
    startCommand: cd backend && node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ENABLE_CRON
        value: "true"
